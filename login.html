      <a href="index.html">

    <nav id="nav">

      <a href="3dprint.html">3D принтирането</a>

      <a href="contact.html">Контакти</a>
      <a href="parents.html">За родители</a>
      <a id="login-link" href="login.html" class="active">Вход</a>
      <a href="admin.html" id="admin-link" style="display:none;">Админ панел</a>
    </nav>

    <button id="menu-toggle">☰</button>

    <div id="dashboard" class="dashboard" style="display:none;">
      <button id="dashboard-btn">
        <span class="dash-avatar">👤</span>
      </button>
      <div id="dashboard-menu" class="dashboard-menu">
        <p id="user-greeting">Здравей!</p>
        <a href="favorites.html">❤️ Любими</a>

      </div>
    </div>
  </header>

  <main class="login-page">
    <h1>Вход в DesignRealm</h1>
    <p>Влез в профила си, за да запазваш любими модели и следиш новини.</p>

    <form class="login-form" id="login-form">
      <input type="email" id="login-email" placeholder="Имейл" required>
      <input type="password" id="login-password" placeholder="Парола" required>
      <button type="submit" class="btn">Вход</button>
      <div style="margin-top:0.75rem">
        <button id="google-signin" class="btn" type="button">Влез с Google</button>
      </div>
      <button id="github-signin" class="btn github-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 24 24">
          <path
            d="M12 .5C5.73.5.96 5.27.96 11.54c0 4.88 3.16 9.02 7.55 10.48.55.1.75-.24.75-.54v-2.1c-3.07.67-3.72-1.48-3.72-1.48-.5-1.28-1.22-1.62-1.22-1.62-.99-.67.08-.66.08-.66 1.1.08 1.68 1.13 1.68 1.13.97 1.66 2.54 1.18 3.16.9.1-.7.38-1.18.7-1.45-2.45-.28-5.02-1.23-5.02-5.5 0-1.22.44-2.22 1。
        Вход с GitHub
      </button>
      <p>Нямаш профил? <a href="register.html">Регистрирай се</a></p>
    </form>

  <script type="module" src="monitor.js"></script>
