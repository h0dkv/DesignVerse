  <main class="contact-page">
    <h1>Регистрация</h1>
    <p>Създай своя акаунт в DesignRealm и се присъедини към нашата общност!</p>

    <form class="register-form">
      <input type="text" id="username" placeholder="Потребителско име" required>
      <input type="email" id="email" placeholder="Имейл" required>
      <input type="password" id="password" placeholder="Парола" required>
      <input type="password" id="confirm-password" placeholder="Повтори паролата" required>
      <button type="submit" class="btn">Регистрирай се</button>
      <div style="margin-top:.75rem">
        <button id="google-register" class="btn" type="button">Регистрация с Google</button>
      </div>
      <button id="github-register" class="btn github-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 24 24">
          <path
            d="M12 .5C5.73.5.96 5.27.96 11.54c0 4.88 3.16 9.02 7.55 10.48.55.1.75-.24.75-.54v-2.1c-3.07.67-3.72-1.48-3.72-1.48-.5-1.28-1.22-1.62-1.22-1.62-.99-.67.08-.66.08-.66 1.1.08 1.68 1.13 1.68 1.13.97 1.66 2.54 1.18 3.16.9.1-.7.38-1.18.
        </svg>

        Вход с GitHub
      </button>
    </form>

    <p>Вече имаш акаунт? <a href="login.html">Влез тук</a>.</p>
