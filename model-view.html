<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модел | DesignRealm</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        #preview-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #0d0d1a;
            border-radius: 12px;
            overflow: hidden;
        }

        #preview-container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        #preview-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .preview-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            pointer-events: none;
            white-space: nowrap;
        }

        .preview-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 0.5rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .preview-loading .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #9b59b6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="images/logo_notext.png" alt="DesignRealm Logo">
                <span>DesignRealm</span>
            </a>
        </div>
        <nav id="nav">
            <a href="index.html">Начало</a>
            <a href="3dprint.html">3D принтирането</a>
            <a href="catalog.html" class="active">Каталог</a>
            <a href="blog.html">Блог</a>
            <a href="about.html">За нас</a>
            <a href="contact.html">Контакти</a>
            <a href="parents.html">За родители</a>
            <a id="login-link" href="login.html">Вход</a>
            <a href="admin.html" id="admin-link" style="display:none;">Админ панел</a>
        </nav>
        <button id="menu-toggle">☰</button>
        <div id="dashboard" class="dashboard" style="display:none;">
            <button id="dashboard-btn"><span class="dash-avatar">👤</span></button>
            <div id="dashboard-menu" class="dashboard-menu">
                <p id="user-greeting">Здравей!</p>
                <a href="favorites.html">❤️ Любими</a>
                <a href="profile.html">⚙️ Профил</a>
                <a href="upload.html">Качи модел</a>
                <button id="logout-btn" class="btn-logout">🚪 Изход</button>
            </div>
        </div>
    </header>

    <main style="max-width:900px;margin:2rem auto;padding:0 1.5rem;">
        <a href="catalog.html" class="back-link">← Обратно към каталога</a>

        <div id="model-content">
            <div style="text-align:center;padding:4rem;color:rgba(255,255,255,0.5);">
                <div style="font-size:3rem;margin-bottom:1rem;">⏳</div>
                <p>Зареждане...</p>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 DesignRealm. Всички права запазени.</p>
    </footer>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module" src="script.js"></script>
    <script type="module" src="firebase-init.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="dashboard.js"></script>
    <script type="module" src="check.js"></script>
    <script type="module" src="notifications.js"></script>
    <script type="module" src="firebase-favorites.js"></script>

    <script type="module">
        import { db } from "./firebase-init.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

        const content = document.getElementById("model-content");

        function formatSize(bytes) {
            if (!bytes) return "—";
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(1) + ["B", "KB", "MB", "GB"][i];
        }

        function formatDate(ts) {
            if (!ts) return "—";
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleDateString("bg-BG");
        }

        function isSTL(url) {
            if (!url) return false;
            // Проверява и Cloudinary URLs (преди query string)
            return url.split("?")[0].toLowerCase().endsWith(".stl");
        }

        function init3DPreview(stlUrl, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            // Loading индикатор
            const loadingEl = document.createElement("div");
            loadingEl.className = "preview-loading";
            loadingEl.innerHTML = `<div class="spinner"></div><span>Зареждане на 3D модел...</span>`;
            container.appendChild(loadingEl);

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d0d1a);

            const w = container.clientWidth;
            const h = container.clientHeight;
            const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 10000);
            camera.position.set(0, 0, 5);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(w, h);

            // Осветление
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
            keyLight.position.set(5, 8, 5);
            scene.add(keyLight);
            const fillLight = new THREE.DirectionalLight(0x9b59b6, 0.4);
            fillLight.position.set(-5, -3, -5);
            scene.add(fillLight);

            // Orbit controls — ръчна имплементация (без external import)
            let isDragging = false;
            let prevMouse = { x: 0, y: 0 };
            let spherical = { theta: 0, phi: Math.PI / 2 };
            let radius = 5;
            const target = new THREE.Vector3(0, 0, 0);

            function updateCamera() {
                camera.position.x = target.x + radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
                camera.position.y = target.y + radius * Math.cos(spherical.phi);
                camera.position.z = target.z + radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
                camera.lookAt(target);
            }

            const canvas = renderer.domElement;
            canvas.addEventListener("mousedown", e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
            canvas.addEventListener("mouseup", () => isDragging = false);
            canvas.addEventListener("mouseleave", () => isDragging = false);
            canvas.addEventListener("mousemove", e => {
                if (!isDragging) return;
                const dx = e.clientX - prevMouse.x;
                const dy = e.clientY - prevMouse.y;
                spherical.theta -= dx * 0.01;
                spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi - dy * 0.01));
                prevMouse = { x: e.clientX, y: e.clientY };
                updateCamera();
            });
            canvas.addEventListener("wheel", e => {
                radius = Math.max(1, Math.min(500, radius + e.deltaY * 0.05));
                updateCamera();
                e.preventDefault();
            }, { passive: false });

            // Touch поддръжка
            let lastTouch = null;
            canvas.addEventListener("touchstart", e => { lastTouch = e.touches[0]; });
            canvas.addEventListener("touchmove", e => {
                if (!lastTouch || e.touches.length !== 1) return;
                const t = e.touches[0];
                const dx = t.clientX - lastTouch.clientX;
                const dy = t.clientY - lastTouch.clientY;
                spherical.theta -= dx * 0.01;
                spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi - dy * 0.01));
                lastTouch = t;
                updateCamera();
                e.preventDefault();
            }, { passive: false });

            // STL Loader (вграден, без external JS файл)
            function parseSTL(buffer) {
                // Опитай binary STL
                const isBinary = (() => {
                    const header = new Uint8Array(buffer, 0, 80);
                    const triCount = new DataView(buffer).getUint32(80, true);
                    return buffer.byteLength === 84 + triCount * 50;
                })();

                const geometry = new THREE.BufferGeometry();

                if (isBinary) {
                    const view = new DataView(buffer);
                    const triCount = view.getUint32(80, true);
                    const positions = new Float32Array(triCount * 9);
                    const normals = new Float32Array(triCount * 9);
                    let offset = 84;
                    for (let i = 0; i < triCount; i++) {
                        const nx = view.getFloat32(offset, true); offset += 4;
                        const ny = view.getFloat32(offset, true); offset += 4;
                        const nz = view.getFloat32(offset, true); offset += 4;
                        for (let v = 0; v < 3; v++) {
                            const base = i * 9 + v * 3;
                            positions[base] = view.getFloat32(offset, true); offset += 4;
                            positions[base + 1] = view.getFloat32(offset, true); offset += 4;
                            positions[base + 2] = view.getFloat32(offset, true); offset += 4;
                            normals[base] = nx; normals[base + 1] = ny; normals[base + 2] = nz;
                        }
                        offset += 2; // attribute byte count
                    }
                    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
                    geometry.setAttribute("normal", new THREE.BufferAttribute(normals, 3));
                } else {
                    // ASCII STL
                    const text = new TextDecoder().decode(buffer);
                    const verts = [];
                    const re = /vertex\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)/g;
                    let m;
                    while ((m = re.exec(text)) !== null) {
                        verts.push(parseFloat(m[1]), parseFloat(m[2]), parseFloat(m[3]));
                    }
                    geometry.setAttribute("position", new THREE.BufferAttribute(new Float32Array(verts), 3));
                    geometry.computeVertexNormals();
                }

                return geometry;
            }

            // Зареди STL файла
            fetch(stlUrl)
                .then(r => {
                    if (!r.ok) throw new Error("HTTP " + r.status);
                    return r.arrayBuffer();
                })
                .then(buffer => {
                    loadingEl.remove();

                    const geometry = parseSTL(buffer);
                    geometry.center();

                    const material = new THREE.MeshPhongMaterial({
                        color: 0x7c3aed,
                        specular: 0xc4b5fd,
                        shininess: 60,
                        side: THREE.DoubleSide
                    });

                    const mesh = new THREE.Mesh(geometry, material);
                    scene.add(mesh);

                    // Auto-fit камера
                    const box = new THREE.Box3().setFromObject(mesh);
                    const size = box.getSize(new THREE.Vector3()).length();
                    radius = size * 1.8;
                    updateCamera();

                    container.appendChild(canvas);

                    // Hint
                    const hint = document.createElement("div");
                    hint.className = "preview-hint";
                    hint.textContent = "🖱️ Влачи за въртене • Скрол за зум";
                    container.appendChild(hint);
                    setTimeout(() => hint.style.opacity = "0", 3000);
                    hint.style.transition = "opacity 1s";

                    // Auto-rotate докато не се докосне
                    let autoRotate = true;
                    canvas.addEventListener("mousedown", () => autoRotate = false);
                    canvas.addEventListener("touchstart", () => autoRotate = false);

                    function animate() {
                        requestAnimationFrame(animate);
                        if (autoRotate) {
                            spherical.theta += 0.005;
                            updateCamera();
                        }
                        renderer.render(scene, camera);
                    }
                    animate();

                    // Resize
                    window.addEventListener("resize", () => {
                        const w = container.clientWidth;
                        const h = container.clientHeight;
                        camera.aspect = w / h;
                        camera.updateProjectionMatrix();
                        renderer.setSize(w, h);
                    });
                })
                .catch(err => {
                    console.warn("3D preview грешка:", err);
                    loadingEl.remove();
                    // При грешка не показваме нищо — снимката вече е там
                });
        }

        async function loadModel() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");

            if (!id) {
                content.innerHTML = `<div style="text-align:center;padding:3rem;color:rgba(255,255,255,0.5)"><div style="font-size:3rem">❌</div><p>Невалиден модел.</p></div>`;
                return;
            }

            try {
                const snap = await getDoc(doc(db, "models", id));

                if (!snap.exists()) {
                    content.innerHTML = `<div style="text-align:center;padding:3rem;color:rgba(255,255,255,0.5)"><div style="font-size:3rem">🔍</div><p>Моделът не е намерен.</p></div>`;
                    return;
                }

                const m = snap.data();
                const img = m.imageURL || m.imageUrl || "images/logo_notext.png";
                const file = m.fileURL || m.fileUrl || "#";
                const title = m.title || "Без заглавие";
                const hasSTL = isSTL(file);

                document.title = `${title} | DesignRealm`;

                content.innerHTML = `
                    <div class="model-layout">
                        <div class="model-view">
                            <div id="preview-container">
                                ${!hasSTL ? `<img src="${img}" alt="${title}" onerror="this.src='images/logo_notext.png'">` : ""}
                            </div>
                        </div>
                        <div class="model-details">
                            <h1>${title}</h1>
                            ${m.description ? `<p class="model-description">${m.description}</p>` : ""}
                            <div class="model-meta">
                                <div><strong>📁 Файл:</strong> ${m.fileName || "—"}</div>
                                <div><strong>📦 Размер:</strong> ${formatSize(m.fileSize)}</div>
                                <div><strong>👤 Качен от:</strong> ${m.uploaderEmail || "—"}</div>
                                <div><strong>📅 Дата:</strong> ${formatDate(m.publishedAt || m.createdAt)}</div>
                            </div>
                            <div class="model-actions">
                                <a href="${file}" download class="btn">⬇️ Изтегли STL</a>
                                <button class="fav-btn btn" data-title="${title}" data-img="${img}" data-file="${file}">❤️ Добави в любими</button>
                            </div>
                        </div>
                    </div>
                `;

                // Стартирай 3D preview само за STL файлове
                if (hasSTL) {
                    init3DPreview(file, "preview-container");
                }

            } catch (err) {
                console.error(err);
                content.innerHTML = `<div style="text-align:center;padding:3rem;color:rgba(255,255,255,0.5)"><div style="font-size:3rem">⚠️</div><p>Грешка при зареждане.</p></div>`;
            }
        }

        loadModel();
    </script>
</body>

</html>
